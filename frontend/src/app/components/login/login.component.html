<div class="login-form-container">
  <si-heading [si-size]="400" style="margin-left: auto; margin-right: auto;">Login</si-heading>

  <si-button
    style="display:block; padding-top:var(--space-100);"
    si-variant="primary"
    class="submit-button"
    data-slot="button-container"
    (click)="onSubmit()"
    (keyup)="onSubmit()"
    >
    <span>Login with SSO</span>
    <si-icon si-svg="functionalLogin" si-sprite="essentials" slot="icon-after"></si-icon>
  </si-button>
</div>
